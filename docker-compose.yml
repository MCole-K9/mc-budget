services:
  pocketbase:
    build:
      context: .
      dockerfile: Dockerfile.pocketbase
    volumes:
      - pb_data:/pb/pb_data
    environment:
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
    ports:
      - "8090:8090"   # expose for PocketBase admin UI — remove in production if not needed
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8090/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  sveltekit:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      PUBLIC_POCKETBASE_URL: ${PUBLIC_POCKETBASE_URL:-http://pocketbase:8090}
      PB_ADMIN_EMAIL: ${PB_ADMIN_EMAIL}
      PB_ADMIN_PASSWORD: ${PB_ADMIN_PASSWORD}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      BODY_SIZE_LIMIT: ${BODY_SIZE_LIMIT:-10M}
    ports:
      - "3000:3000"
    depends_on:
      pocketbase:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pb_data:
